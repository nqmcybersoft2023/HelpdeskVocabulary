<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IT Helpdesk Vocabulary Game</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>IT Helpdesk Vocabulary Trainer</h1>

<p>Match English words with Vietnamese meanings</p>

</header>
<div class="search-container">
    <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm từ vựng Anh - Việt, Việt - Anh...">
    <div id="searchResults"></div>
</div>

<div class="stats">

<div class="stat-box">
Lesson
<span id="lesson">1</span>
</div>

<div class="stat-box">
Score
<span id="score">0</span>
</div>

</div>


<div class="game-container">

<div class="column">

<h3>Vietnamese</h3>

<div id="viColumn"></div>

</div>


<div class="column">

<h3>English</h3>

<div id="enColumn"></div>

</div>

</div>


<div class="controls">

<button onclick="loadLesson()">Restart Lesson</button>

</div>


<footer>

<p>Learn 500 Helpdesk Words • Technical Support Training</p>

</footer>


<script src="vocab-game.js"></script>

</body>
</html>
