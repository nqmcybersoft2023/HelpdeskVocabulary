<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Helpdesk Vocabulary Game & Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>IT Helpdesk Vocabulary Trainer</h1>
        <p>Match English words with Vietnamese meanings & Search Dictionary</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm từ vựng Anh - Việt, Việt - Anh...">
        <div id="searchResults"></div>
    </div>

    <div class="stats">
        <div class="stat-box">Lesson <span id="lesson">1</span></div>
        <div class="stat-box">Score <span id="score">0</span></div>
    </div>

    <div class="game-container">
        <div class="column">
            <h3>Tiếng Việt</h3>
            <div id="viColumn"></div>
        </div>
        <div class="column">
            <h3>Tiếng Anh</h3>
            <div id="enColumn"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="loadLesson()">Restart Lesson</button>
    </div>

    <footer>
        <p>Learn Helpdesk Words • Technical Support Training</p>
    </footer>

    <div id="wordModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="word-header">
                <h2 id="modalEnWord">Word</h2>
                <button class="speak-btn" onclick="speakModalWord()" title="Nghe phát âm">🔊</button>
            </div>
            <p class="word-meaning">Nghĩa: <span id="modalViMeaning">Nghĩa của từ</span></p>
        </div>
    </div>

    <script src="vocab-game.js"></script>
</body>
</html>
